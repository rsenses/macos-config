worktree-path = ".worktrees/{{ branch | sanitize }}"
skip-commit-generation-prompt = true

[[pre-start]]
copy = "wt step copy-ignored"

[[pre-start]]
envrc = "if [ ! -e .envrc ]; then if [ -n \"{{ base_worktree_path }}\" ] && [ -f \"{{ base_worktree_path }}/.envrc\" ]; then cp \"{{ base_worktree_path }}/.envrc\" .envrc; elif [ -f \"{{ primary_worktree_path }}/.envrc\" ]; then cp \"{{ primary_worktree_path }}/.envrc\" .envrc; fi; fi"

[[pre-start]]
mise = """
if command -v mise >/dev/null 2>&1; then
  mise trust -y .
  mise install
fi
"""

[post-switch]
rename_tmux = """
if [ -n "${TMUX:-}" ] && [ -n "${TMUX_PANE:-}" ]; then
  BRANCH="{{ branch | sanitize }}"
  WINDOW_ID="$(tmux display-message -p -t "$TMUX_PANE" '#{window_id}')"
  tmux rename-window -t "$WINDOW_ID" "$BRANCH" >/dev/null 2>&1 || true
fi
"""

[commit.generation]
command = '''f=$(mktemp); printf '\n\n' > "$f"; sed 's/^/# /' >> "$f"; ${EDITOR:-vi} "$f" < /dev/tty > /dev/tty; grep -v '^#' "$f"'''

[projects]
