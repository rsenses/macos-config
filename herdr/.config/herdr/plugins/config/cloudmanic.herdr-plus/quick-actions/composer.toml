# A plain command action: selecting it runs `command` immediately.
# This is the simplest possible action — just a name, a description, and a
# command. `type` defaults to "command" when omitted.

name = "Composer"
description = "Composer useful commands"
type = "select"
command = "{{.Value}}"

[[options]]
label = "Fix"
value = "composer fix"
description = "composer fix"

[[options]]
label = "Test"
value = "composer test"
description = "composer test"

[[options]]
label = "Update"
value = "composer update"
description = "composer update"
