# A plain command action: selecting it runs `command` immediately.
# This is the simplest possible action — just a name, a description, and a
# command. `type` defaults to "command" when omitted.

name = "Update"
description = "Updates all packages"
command = "brew -v update; brew upgrade; brew cleanup; brew doctor; composer self-update && composer global update; npm update -g; npm cache clean --force"
