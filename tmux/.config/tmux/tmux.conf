# Terminal multiplexer
# https://github.com/tmux/tmux

# set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"

# Set terminal colors
set-option -sa terminal-overrides ",*:RGB"

# Start window and pane numbering from 1 for easier switching
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Allow automatic renaming of windows
set -g allow-rename on

# Renumber windows when one is removed.
set -g renumber-windows on

# Allow the mouse to resize windows and select tabs
set -g mouse on

# use system clipboard
set -g set-clipboard on

# A bell in another window should cause a bell in the current window
set -g bell-action any

# don't detach tmux when killing a session
set -g detach-on-destroy off

# https://github.com/3rd/image.nvim/?tab=readme-ov-file#tmux
# This is needed by the image.nvim plugin
set -gq allow-passthrough on
# This is related to the `tmux_show_only_in_active_window = true,` config in
# image.nvim
set -g visual-activity off

# Increase history limit, as we want an "almost" unlimited buffer.
# May be set to something even higher, like 250k
set-option -g history-limit 100000

# Set vi mode globally for all windows
setw -g mode-keys vi
# bind-key -T copy-mode-vi v send -X begin-selection
# bind-key -T copy-mode-vi V send -X select-line
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# STYLING
set -g pane-active-border-style fg=color5
set -g pane-border-style fg=color7
set -g pane-border-lines simple

# QoL
set -g escape-time 0
set -g repeat-time 1000

#--------------------------------------------------------------------------
# Key Bindings
#--------------------------------------------------------------------------

# -r means that the bind can repeat without entering prefix again
# -n means that the bind doesn't use the prefix

# remap prefix from 'C-b' to 'C-space'
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Cambiar de sesión
bind -n C-Up switch-client -p
bind -n C-Down switch-client -n

# Cambiar de ventana
bind -n C-Left previous-window
bind -n C-Right next-window

# Change the path for newly created windows
bind c new-window -c "#{pane_current_path}"

# Opend downloads but take care of detach
unbind d
bind d confirm-before -p "Quieres desconectar tmux? (y/n)" detach-client
bind D new-window -c "~/Downloads"

# Sesh
unbind f
bind-key f display-popup -E "bash sessionizer"

unbind p
bind-key p display-popup -E '
session=$(tmux list-sessions -F "#S" | FZF_DEFAULT_OPTS="" fzf) || exit 0
[ -n "$session" ] && tmux switch-client -t "$session"
'

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt

# open lazygit in a new window with prefix+g
unbind g
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# C-j manda salto de línea, por tanto...
bind-key -T root S-Enter send-keys C-j

#--------------------------------------------------------------------------
# Status line
#--------------------------------------------------------------------------

# Uncomment to move statusbar to the top
set-option -g status-position top

# Basic colors of the Statusbar
set-option -g status-style bg=default,fg=default

# Show the window list centered between the left and the right section
set-option -g status-justify left

# Style and set contents on the left section
set-option -g status-left "#[bg=black,fg=color15,bright,bold]  #S "

# Style and set contents on the right section
set-option -g status-right ""

# Set max length of left and right section
set-option -g status-left-length 100

# Style and set content for the inactive windows
set-option -g window-status-format "#[bold] #I:#W#{?window_zoomed_flag, [],} "

# Style and set content for the active windows
set-option -g window-status-current-format "#[bg=color6,fg=color15,bold] #I:#W#{?window_zoomed_flag, [],} "

# Style and set content for the message window
set-option -g message-style "fg=color15,bg=color6"

set-option -g mode-style "fg=color15,bg=color6"

#--------------------------------------------------------------------------
# TPM Plugins
#--------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # for navigating panes and vim/nvim with Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

#--------------------------------------------------------------------------
# Restore sessions
#--------------------------------------------------------------------------

set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
